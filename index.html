<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="canonical" href="https://tools.nianchen.top/">

    <!-- 外部字体 CDN 预连接：提前完成 DNS+TCP+TLS，减少字体工具首次渲染阻塞 -->
    <!-- crossorigin 必须加：字体文件走 CORS，preconnect 需要匹配实际请求凭证模式 -->
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <!-- dns-prefetch 作为不支持 preconnect 的旧浏览器降级方案 -->
    <link rel="dns-prefetch" href="https://fonts.loli.net">
    <link rel="dns-prefetch" href="https://gstatic.loli.net">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="renderer" content="webkit">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="在线工具箱">
    <meta name="keywords" content="在线工具箱,工具,实用工具,效率工具,在线转换,编码解码,文本处理,图片处理,开发者工具">
    <meta name="description" content="一个轻量的在线工具箱，集成了多种实用的小工具，帮助用户提高工作效率。">
    <meta property="og:locale" content="zh_CN">
    <meta property="og:title" content="在线工具箱">

    <meta property="og:url" content="https://tools.nianchen.top">
    <title>在线工具箱</title>

        "@type": "SearchAction",
        "target": "https://tools.nianchen.top/?q={search_term_string}",
        "query-input": "required name=search_term_string"

    }
    </script>
  </head>
  <body class="bg-[--base-gray]">

</html>
